<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script> 
    <script src="https://files.bpcontent.cloud/2026/06/25/17/20260625173121-JE4EDAVE.js" defer></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMNCAH Cameroon / SRMNEA-Nut Cameroun</title>

    <style>
        :root {
            --primary-red: #8b3a3a;
            --primary-gold: #b59c49;
            --primary-green: #1e7b51;
            --primary-blue: #a4d3d8;
            --bg-light: #f9f9f9;
            --text-dark: #333333;
            --text-gray: #666666;
            --border-color: #e0e0e0;
            --font-main: "Segoe UI", Roboto, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-main);
            color: var(--text-dark);
            background: white;
        }

        a { text-decoration: none; color: inherit; }

        .top-bar {
            background: var(--primary-gold);
            color: white;
            display: flex;
            justify-content: space-between;
            padding: 5px 5%;
        }

        .header {
            padding: 20px 5%;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-bar {
            background: var(--bg-light);
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .hero {
            background: linear-gradient(135deg, rgba(139,58,58,0.9), rgba(181,156,73,0.9));
            color: white;
            padding: 50px;
            text-align: center;
        }

        .main-container {
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 30px;
            padding: 40px 5%;
        }

        .section-title {
            color: var(--primary-red);
            margin-bottom: 20px;
        }

        .sidebar-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .side-btn {
            padding: 15px;
            color: white;
            font-weight: bold;
            text-align: center;
            border-radius: 5px;
        }

        .btn-red { background: var(--primary-red); }
        .btn-gold { background: var(--primary-gold); }
        .btn-green { background: var(--primary-green); }
        .btn-blue { background: var(--primary-blue); color: black; }

        iframe {
            width: 100%;
            height: 600px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        @media(max-width:900px){
            .main-container { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div class="top-bar">RMNCAH Cameroon</div>

<header class="header">
    <h1>Countdown to 2030</h1>
</header>

<nav class="nav-bar">
    <a href="#equity">Equity Profile</a>
</nav>

<!-- HERO -->
<section class="hero">
    <h2>RMNCAH in Cameroon</h2>
    <p>Portfolio and strategic insights for SRMNEA-Nut</p>
</section>

<!-- MAIN -->
<main class="main-container">

<!-- LEFT CONTENT -->
<div>

    <!-- ✅ NEW EMBEDDED PDF SECTION -->
    <section id="equity">
        <h3 class="section-title">Equity Profile Report</h3>

        <iframe 
            src="https://raw.githubusercontent.com/nhanag/rmncah-background-in-Cameroon/main/Abstrat_poster.pdf">
        </iframe>

        <p style="margin-top:10px;">
            <a href="https://raw.githubusercontent.com/nhanag/rmncah-background-in-Cameroon/main/Abstrat_poster.pdf" target="_blank" style="color: var(--primary-red); font-weight:bold;">
                Open full report in new tab →
            </a>
        </p>
    </section>

</div>

<!-- SIDEBAR -->
<div>
    <h3 class="section-title">My Submissions</h3>

    <div class="sidebar-buttons">

        <a href="https://github.com/nhanag/rmncah-background-in-Cameroon/blob/main/RMNCAH_Report%202024_2025.docx"
           class="side-btn btn-red" target="_blank">
            RMNCAH Policy Brief
        </a>

        <div class="side-btn btn-gold">
            Financing Analysis
        </div>

        <!-- ✅ NOW LINKS TO EMBEDDED VIEW -->
        <a href="#equity" class="side-btn btn-green">
            Equity Profile
        </a>

        <div class="side-btn btn-blue">
            GFF Data Portal
        </div>

    </div>
</div>

</main>

<footer style="text-align:center; padding:20px;">
    © 2026 SRMNEA-Nut Portfolio Cameroon
</footer>

</body>
</html>
