<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRMNIA-Nut Cameroun | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --color-primary: #1e3a8a; --color-primary-light: #3b82f6; --color-accent: #e11d48; --color-bg: #f8fafc; --color-text: #0f172a; --color-text-light: #475569; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--color-bg); color: var(--color-text); }
        
        .navbar-content { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; }
        
        /* Sélecteur de langue visible et stylisé */
        .lang-switch { display: flex; gap: 0.5rem; align-items: center; }
        .lang-btn { background: white; border: 1px solid var(--color-primary); padding: 0.4rem 0.8rem; cursor: pointer; border-radius: 6px; font-size: 0.85rem; font-weight: 700; transition: all 0.3s; }
        .lang-btn.active { background: var(--color-primary); color: white; }
    </style>
</head>
<body>

    <nav class="navbar" style="background: white; border-bottom: 1px solid #e2e8f0;">
        <div class="container navbar-content">
            <div class="logo" data-i18n="nav.logo">SRMNIA-Nut CMR</div>
            
            <div style="display: flex; align-items: center; gap: 2rem;">
                <ul class="nav-links" style="display: flex; list-style: none; gap: 1.5rem;">
                    <li><a href="#indicateurs" data-i18n="nav.indicators">Indicateurs</a></li>
                    <li><a href="#financement" data-i18n="nav.finance">Financement</a></li>
                </ul>

                <!-- Sélecteur de langue placé hors de la liste pour être toujours visible -->
                <div class="lang-switch">
                    <button class="lang-btn active" onclick="setLanguage('fr', this)">FR</button>
                    <button class="lang-btn" onclick="setLanguage('en', this)">EN</button>
                </div>
            </div>
        </div>
    </nav>

    <script>
        const translations = {
            fr: {
                "nav.logo": "SRMNIA-Nut CMR",
                "nav.indicators": "Indicateurs",
                "nav.finance": "Financement"
            },
            en: {
                "nav.logo": "SRMNIA-Nut CMR",
                "nav.indicators": "Indicators",
                "nav.finance": "Financing"
            }
        };

        function setLanguage(lang, btnElement) {
            // Mise à jour du texte
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    el.innerText = translations[lang][key];
                }
            });

            // Mise à jour de l'état visuel des boutons
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            
            // Mise à jour de l'attribut lang du document
            document.documentElement.lang = lang;
        }
    </script>
</body>
</html>
