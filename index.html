<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRMNIA-Nut Cameroun | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --color-primary: #1e3a8a; --color-primary-light: #3b82f6; --color-accent: #e11d48; --color-bg: #f8fafc; --color-surface: #ffffff; --color-text: #0f172a; --color-text-light: #475569; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--color-bg); color: var(--color-text); line-height: 1.6; }
        
        /* Language Switcher Styling */
        .lang-switch { display: flex; gap: 0.5rem; margin-left: 1rem; }
        .lang-btn { background: none; border: 1px solid var(--color-text-light); padding: 0.2rem 0.5rem; cursor: pointer; border-radius: 4px; font-size: 0.8rem; }
        .lang-btn.active { background: var(--color-primary); color: white; border-color: var(--color-primary); }

        /* ... [Keep existing CSS for layout, cards, etc. from previous version] ... */
        /* Note: For brevity, ensure your original CSS remains here. */
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container navbar-content">
            <div class="logo" data-i18n="nav.logo">SRMNIA-Nut CMR</div>
            <ul class="nav-links">
                <li><a href="#indicateurs" data-i18n="nav.indicators">Indicateurs</a></li>
                <li><a href="#financement" data-i18n="nav.finance">Financement</a></li>
                <li><a href="#strategies" data-i18n="nav.strategies">Stratégies</a></li>
                <div class="lang-switch">
                    <button class="lang-btn active" onclick="setLanguage('fr')">FR</button>
                    <button class="lang-btn" onclick="setLanguage('en')">EN</button>
                </div>
            </ul>
        </div>
    </nav>

    <!-- ... Hero, Stats, Sections ... -->

    <script>
        const translations = {
            fr: {
                "nav.logo": "SRMNIA-Nut CMR",
                "nav.indicators": "Indicateurs",
                "nav.finance": "Financement",
                "nav.strategies": "Stratégies",
                "hero.title": "Santé de la Reproduction et Nutrition",
                "stat.maternal": "Mortalité Maternelle"
            },
            en: {
                "nav.logo": "SRMNIA-Nut CMR",
                "nav.indicators": "Indicators",
                "nav.finance": "Financing",
                "nav.strategies": "Strategies",
                "hero.title": "Reproductive Health and Nutrition",
                "stat.maternal": "Maternal Mortality"
            }
        };

        function setLanguage(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = translations[lang][key];
            });
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.documentElement.lang = lang;
        }
    </script>
</body>
</html>
